workflows:
  ios-sideloadly:
    name: Build IPA for Sideloadly
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      flutter: 3.24.0  # إصدار مستقر ومعروف
      vars:
        # ⭐ هذا المتغير يجبر النظام على استخدام CocoaPods فقط
        FLUTTER_IOS_USE_SWIFT_PACKAGE_MANAGER: "false"
    
    scripts:
      - name: 🔥 Clean Cache
        script: |
          flutter clean
          rm -rf .dart_tool build ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          rm -f .flutter-plugins* pubspec.lock
          
      - name: 📦 Install Dependencies
        script: flutter pub get
        
      - name: 🛠️ Build IPA
        script: |
          # هذا الأمر يكفي وينفذ كل الخطوات داخلياً
          flutter build ipa --release --no-codesign
          
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log