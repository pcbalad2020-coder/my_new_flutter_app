workflows:
  ios-sideloadly:
    name: Build IPA for Sideloadly
    instance_type: mac_mini_m1
    max_build_duration: 90
    
    environment:
      # ⭐ تثبيت إصدار Flutter محدد (مستقر ومعروف بعدم وجود مشاكل SPM)
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_IOS_USE_SWIFT_PACKAGE_MANAGER: "false"
        BUNDLE_ID: "com.example.wallpaper"
    
    scripts:
      - name: 🔥 Nuclear Clean
        script: |
          flutter clean
          rm -rf .dart_tool build ios/Pods ios/Podfile.lock ios/Flutter/ephemeral
          rm -rf ~/Library/Caches/CocoaPods ~/.cocoapods
          rm -f .flutter-plugins .flutter-plugins-dependencies pubspec.lock
          echo "✅ All cache cleared"
      
      - name: 📦 Install Dependencies
        script: |
          flutter pub get
          echo "✅ Dependencies: $(flutter pub deps --style=compact | grep -c webview || echo 0) webview packages found"
      
      - name: 🛠️ Build IPA
        script: |
          flutter build ipa --release --no-codesign
          echo "✅ IPA built at: $(ls build/ios/ipa/*.ipa 2>/dev/null || echo 'Not found')"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - $EMAIL_ADDRESS
        notify:
          success: true
          failure: true