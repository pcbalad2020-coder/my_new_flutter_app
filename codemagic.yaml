workflows:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # iOS Build for Sideloadly - بسيط وموثوق
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ios-sideloadly:
    name: Build IPA for Sideloadly
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # ⭐ هذا هو السطر الحاسم الذي يحل تضارب SPM
        FLUTTER_IOS_USE_SWIFT_PACKAGE_MANAGER: "false"
        BUNDLE_ID: "com.example.wallpaper"
    
    triggering:
      events:
        - push
      branch:
        patterns:
          - pattern: main
            include: true
    
    scripts:
      - name: 🔥 Clean Everything
        script: |
          flutter clean
          rm -rf .dart_tool build ios/Pods ios/Podfile.lock ios/Flutter/ephemeral
          rm -rf ~/Library/Caches/CocoaPods ~/.cocoapods
          rm -f .flutter-plugins .flutter-plugins-dependencies pubspec.lock
          echo "✅ Cache cleared"
      
      - name: 📦 Install Dependencies
        script: |
          flutter pub get
          echo "✅ Dependencies installed"
      
      - name: 🛠️ Build IPA (No Codesign)
        script: |
          # هذا الأمر يكفي! يقوم بـ:
          # 1. flutter pub get
          # 2. pod install (بـ CocoaPods فقط بفضل المتغير أعلاه)
          # 3. Xcode build
          # 4. تصدير .ipa
          flutter build ipa --release --no-codesign
          echo "✅ IPA built successfully"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - $EMAIL_ADDRESS
        notify:
          success: true
          failure: true