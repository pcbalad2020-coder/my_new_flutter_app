workflows:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # iOS Build Configuration - لتصدير IPA
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    
    environment:
      ios_signing:
        certificates:
          - certificate_reference
        provisioning_profiles:
          - provisioning_profile_reference
      vars:
        BUNDLE_ID: "com.example.wallpaper"
        APP_STORE_CONNECT_TEAM_ID: $APP_STORE_TEAM_ID
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        XCODE_BUILD_CONFIGURATION: "Release"
      flutter: stable
    
    triggering:
      events:
        - push
        - pull_request
      branch:
        patterns:
          - pattern: main
            include: true
          - pattern: develop
            include: true
    
    scripts:
      - name: Get Flutter Dependencies
        script: |
          flutter pub get
      
      - name: Build iOS App
        script: |
          flutter build ios --release \
            --no-codesign
      
      - name: Build IPA
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
          
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/ios_build \
            -allowProvisioningUpdates \
            -archivePath "build/ios_build/Runner.xcarchive" \
            archive
          
          xcodebuild -exportArchive \
            -archivePath "build/ios_build/Runner.xcarchive" \
            -exportOptionsPlist "ios/ExportOptions.plist" \
            -exportPath "build/ios_build/ipa" \
            -allowProvisioningUpdates
    
    artifacts:
      - build/ios_build/ipa/*.ipa
      - build/ios_build/ipa/*.xcarchive
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: false
        beta_groups: []
      
      email:
        recipients:
          - $EMAIL_ADDRESS
        notify:
          success: true
          failure: true
      
      slack:
        channel: '#builds'
        notify_on_build_start: true
        notify:
          success: true
          failure: true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Android Build Configuration (اختياري)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  android-release:
    name: Android Release Build
    instance_type: linux
    
    environment:
      android_signing:
        - keystore_reference
      vars:
        BUNDLE_ID: "com.example.wallpaper"
      flutter: stable
    
    scripts:
      - name: Get Flutter Dependencies
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release
      
      - name: Build App Bundle
        script: |
          flutter build appbundle --release
    
    artifacts:
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/bundle/release/*.aab
    
    publishing:
      email:
        recipients:
          - $EMAIL_ADDRESS
        notify:
          success: true
          failure: true
