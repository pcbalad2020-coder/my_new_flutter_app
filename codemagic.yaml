workflows:
  ios-sideloadly:
    name: Build IPA for Sideloadly
    instance_type: mac_mini_m1
    max_build_duration: 90
    
    environment:
      flutter: 3.24.0
      vars:
        FLUTTER_IOS_USE_SWIFT_PACKAGE_MANAGER: "false"
        # ⭐ مهم جداً: فريق تطوير فارغ
        DEVELOPMENT_TEAM: ""
    
    scripts:
      - name: 🔥 Clean Cache
        script: |
          flutter clean
          rm -rf .dart_tool build ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          rm -f .flutter-plugins* pubspec.lock
          
      - name: 📦 Install Dependencies
        script: flutter pub get
      
      - name: 🛠️ Build .app Bundle (No Signing)
        script: |
          cd ios
          
          # بناء المشروع بأوامر Xcode المباشرة مع تعطيل التوقيع كلياً
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build -quiet
          
          echo "✅ .app built successfully"
          
      - name: 📦 Package as IPA
        script: |
          cd ios
          
          # إنشاء مجلد Payload
          rm -rf Payload
          mkdir -p Payload/Runner.app
          
          # نسخ التطبيق
          cp -R build/Build/Products/Release-iphoneos/Runner.app/* Payload/Runner.app/
          
          # نسخ ملف Info.plist إذا لم يكن موجوداً
          if [ ! -f Payload/Runner.app/Info.plist ]; then
            cp build/Build/Products/Release-iphoneos/Runner.app/Info.plist Payload/Runner.app/ 2>/dev/null || true
          fi
          
          # ضغط إلى IPA
          cd Payload
          zip -r ../app-release.ipa Runner.app
          cd ..
          
          # نقل الناتج لمجلد يمكن لـ Codemagic الوصول إليه
          mkdir -p ../../build/ios/ipa
          cp app-release.ipa ../../build/ios/ipa/
          
          echo "✅ IPA created: $(ls -lh ../../build/ios/ipa/app-release.ipa)"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log