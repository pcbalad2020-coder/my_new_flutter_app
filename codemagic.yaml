workflows:
  ios-sideloadly:
    name: Build IPA for Sideloadly
    instance_type: mac_mini_m1
    max_build_duration: 90
    
    environment:
      flutter: 3.24.0
      vars:
        FLUTTER_IOS_USE_SWIFT_PACKAGE_MANAGER: "false"
    
    scripts:
      - name: 🔥 Clean Cache
        script: |
          flutter clean
          rm -rf .dart_tool build ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          rm -f .flutter-plugins* pubspec.lock
          
      - name: 📦 Install Dependencies
        script: flutter pub get
      
      - name: 🛠️ Build IPA (No Signing)
        script: |
          # هذا الأمر يبني بدون أي توقيع
          flutter build ipa --release --no-codesign
          
      - name: 📦 Create IPA without signing
        script: |
          # طريقة بديلة: بناء .app ثم تحويله لـ .ipa يدوياً
          cd ios
          
          # بناء المشروع بدون توقيع
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
            
          # إنشاء مجلد Payload
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Runner.app Payload/
          
          # ضغط إلى IPA
          zip -r ../Runner.ipa Payload
          cd ..
          
          echo "✅ IPA created: $(ls -lh ios/Runner.ipa)"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/Runner.ipa
      - /tmp/xcodebuild_logs/*.log