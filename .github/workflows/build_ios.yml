name: Build iOS IPA for Sideloadly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Disable Swift Package Manager
      run: flutter config --no-enable-swift-package-manager

    - name: Clean and Install dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Install CocoaPods dependencies
      run: |
        cd ios
        rm -rf Pods Podfile.lock
        pod install

    - name: Build IPA for Sideloading
      run: |
        flutter build ios --release --no-codesign
        mkdir -p build/ios/iphoneos/Payload
        mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -r FlutterApp.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sideload-Build
        path: build/ios/iphoneos/FlutterApp.ipa