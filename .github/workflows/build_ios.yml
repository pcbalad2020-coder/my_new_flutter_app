name: Build iOS IPA for Sideloadly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 1. تنظيف عميق وحل مشكلة الـ SPM عبر قراءة الاعتماديات من جديد
    - name: Clean & Fetch Dependencies
      run: |
        flutter clean
        flutter pub get

    # 2. خطوة حل العناد: تحديث مستودعات الـ Pods وتجاوز تعليق الـ Resolver
    - name: Configure and Update iOS Pods
      run: |
        cd ios
        pod repo update
        pod install --repo-update

    # 3. بناء الحزمة النهائية بصيغة متوافقة مع Sideloadly
    - name: Build IPA for Sideloading
      run: |
        flutter build ios --release --no-codesign
        mkdir -p build/ios/iphoneos/Payload
        mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -r FlutterApp.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sideload-Build
        path: build/ios/iphoneos/FlutterApp.ipa