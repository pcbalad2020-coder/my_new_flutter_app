name: Build iOS IPA for Sideloadly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # حذف مجلد ios بالكامل لإجبار فلاتر على توليده بشكل نظيف خالٍ من كاش SPM
    - name: Reconstruct iOS Project Cleanly
      run: |
        rm -rf ios/Podfile.lock
        flutter clean
        flutter pub get

    # بناء الحزمة مع تجميع ملف الـ IPA المناسب لـ Sideloadly
    - name: Build IPA for Sideloading
      run: |
        flutter build ios --release --no-codesign --no-pub-ios-swift-package-manager
        mkdir -p build/ios/iphoneos/Payload
        mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -r FlutterApp.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sideload-Build
        path: build/ios/iphoneos/FlutterApp.ipa