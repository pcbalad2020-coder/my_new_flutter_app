name: Build iOS IPA & Deploy Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. جوب بناء نسخة الايفون
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Disable Swift Package Manager
      run: flutter config --no-enable-swift-package-manager

    - name: Clean and Install dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Force disable SPM in Flutter tools
      run: |
        FLUTTER_ROOT=$(flutter --version --machine | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
        SPM_FILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/ios/swift_package_manager.dart"
        if [ -f "$SPM_FILE" ]; then
          sed -i '' 's/static bool isSwiftPackageManagerEnabled/\/\/ static bool isSwiftPackageManagerEnabled/' "$SPM_FILE" || true
        fi
        mkdir -p ~/.config/flutter
        echo '{"enable-swift-package-manager": false}' > ~/.config/flutter/settings.json
        cat ~/.config/flutter/settings.json

    - name: Install CocoaPods dependencies
      run: |
        cd ios
        rm -rf Pods Podfile.lock
        sudo gem install cocoapods -v 1.15.2
        pod install --repo-update
      env:
        LANG: en_US.UTF-8

    - name: Build IPA for Sideloading
      run: |
        flutter build ios --release --no-codesign \
          --dart-define=GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
        mkdir -p build/ios/iphoneos/Payload
        mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -r FlutterApp.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sideload-Build
        path: build/ios/iphoneos/FlutterApp.ipa

  # 2. جوب بناء الويب ونشره تلقائياً (تعديل اسم المستودع هنا)
  deploy-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Build Flutter Web
      # تم تعديل الاسم هنا ليطابق مستودعك الحالي وضمان عمل الروابط بدون صفحات بيضاء
      run: flutter build web --base-href "/my_new_flutter_app/" --release

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/web